<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Brand Blue/Indigo gradient (for the Seat Arc) -->
    <linearGradient id="seat-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" /> <!-- Brand Dark Blue -->
      <stop offset="100%" stop-color="#2563eb" /> <!-- Brand Primary Blue -->
    </linearGradient>
    
    <!-- Electric Cyan to Light Blue gradient (for the Flow Wave) -->
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" /> <!-- Brand Primary Blue -->
      <stop offset="100%" stop-color="#00f0ff" /> <!-- Neon Cyan -->
    </linearGradient>
    
    <!-- Glowing neon filter for tab readability -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 1. The Seat Row Arc (Brand Blue Gradient) -->
  <path d="M 6 19 C 11 12, 21 12, 26 19" 
        stroke="url(#seat-grad)" stroke-width="2.5" stroke-linecap="round" filter="url(#neon-glow)" />

  <!-- 2. The Floating Seat Dots (Matching the Cyan/Blue Theme) -->
  <circle cx="11" cy="11.5" r="1.8" fill="#00f0ff" filter="url(#neon-glow)" />
  <circle cx="16" cy="8.5" r="1.8" fill="#2563eb" filter="url(#neon-glow)" />
  <circle cx="21" cy="11.5" r="1.8" fill="#00f0ff" filter="url(#neon-glow)" />

  <!-- 3. The Flow Wave (Electric Cyan/Blue Gradient) -->
  <path d="M 6 23 C 11 27, 21 18, 26 22" 
        stroke="url(#flow-grad)" stroke-width="2.5" stroke-linecap="round" filter="url(#neon-glow)" />
</svg>